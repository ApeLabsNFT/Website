[build]
  publish = "."

[[redirects]]
  from = "/conditions"
  to = "/Conditions.dc.html"
  status = 200

[[redirects]]
  from = "/condition"
  to = "/Condition.dc.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/About Dr Rutvi.dc.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
