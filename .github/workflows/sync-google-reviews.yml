name: Sync Google Reviews

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch Google reviews
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
        run: node scripts/sync-google-reviews.mjs
      - name: Commit review data
        run: |
          if git diff --quiet -- data/google-reviews.json; then
            echo "No review changes to commit."
            exit 0
          fi
          git config user.name "apelabsnft"
          git config user.email "tejus.sharma10@gmail.com"
          git add data/google-reviews.json
          git commit -m "Sync Google reviews"
          git push
